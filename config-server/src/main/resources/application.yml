server:
  port: 8888

spring:
  application:
    name: config-server

  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        prefer-ip-address: true

    config:
      server:
        git:
          uri: https://github.com/sunildevops45/E-Commerce-Microservice.git
          default-label: master
          searchPaths:
            - configuration
            - configuration/user-service
            - configuration/order-service
            - configuration/product-service
